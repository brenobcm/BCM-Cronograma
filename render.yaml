services:
  - type: web
    name: bcm-gantt
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --loop asyncio
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /data/gantt.db
    disk:
      name: gantt-db
      mountPath: /data
      sizeGB: 1
