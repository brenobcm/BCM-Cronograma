<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BCM — Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#0d1f3c;--primary2:#1a3461;--accent:#0284c7;--bg:#edf1f7;--sur:#fff;--sur2:#f4f7fb;--brd:#dde3ed;--txt:#1e293b;--txt2:#475569;--txt3:#94a3b8;--ok:#16a34a;--warn:#d97706;--err:#dc2626}
html.dark{--bg:#0e1626;--sur:#131f33;--sur2:#182540;--brd:#243050;--txt:#dde4f0;--txt2:#8fa3c0;--txt3:#4d6080}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
/* Nav */
nav{background:var(--primary);color:#fff;height:58px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nav-logo img{height:36px;background:#fff;padding:3px 6px;border-radius:6px}
.nav-logo span{font-size:11px;opacity:.7;display:block;margin-top:2px;white-space:nowrap}
.nav-sep{flex:1}
.nav-user{font-size:13px;opacity:.85;white-space:nowrap}
.nav-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-decoration:none}
.nav-btn:hover{background:rgba(255,255,255,.25)}
/* Page */
.page{max-width:1100px;margin:0 auto;padding:32px 20px}
.page-hdr{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.page-hdr h1{font-size:22px;color:var(--primary)}
html.dark .page-hdr h1{color:var(--txt)}
.btn-new{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-new:hover{opacity:.9}
/* Cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:20px}
.card{background:var(--sur);border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--brd);cursor:pointer;transition:box-shadow .2s,transform .15s;text-decoration:none;display:block}
.card:hover{box-shadow:0 6px 24px rgba(2,132,199,.15);transform:translateY(-2px)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-name{font-size:17px;font-weight:700;color:var(--txt)}
.card-status{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.s-active{background:#dcfce7;color:#166534}
.s-paused{background:#fef9c3;color:#854d0e}
.s-done{background:#dbeafe;color:#1e40af}
html.dark .s-active{background:#14532d;color:#86efac}
html.dark .s-paused{background:#451a03;color:#fcd34d}
html.dark .s-done{background:#1e3a5f;color:#93c5fd}
.card-client{font-size:13px;color:var(--txt2);margin-bottom:4px}
.card-loc{font-size:12px;color:var(--txt3)}
.card-dates{font-size:12px;color:var(--txt3);margin-top:10px}
.card-prog{margin-top:14px}
.prog-bar{height:6px;background:var(--brd);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--txt3)}
/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--txt2)}
.empty svg{opacity:.3;margin-bottom:16px}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--sur);border-radius:16px;padding:32px;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal h3{font-size:18px;margin-bottom:20px;color:var(--txt)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--txt2);margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 10px;border:1.5px solid var(--brd);border-radius:7px;font-size:14px;color:var(--txt);background:var(--sur);outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{background:var(--sur2);border:1px solid var(--brd);color:var(--txt2);padding:8px 16px;border-radius:7px;cursor:pointer;font-size:13px}
.btn-save{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600}
.btn-save:hover{opacity:.9}
/* Dark toggle */
.dk-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 9px;border-radius:6px;cursor:pointer;font-size:15px}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">
    <img id="nav-logo" src="" alt="BCM">
    <span>BCM Eletricidade e Automação</span>
  </div>
  <span class="nav-sep"></span>
  <span class="nav-user" id="nav-user"></span>
  <a href="/users" class="nav-btn" id="link-users" style="display:none">Usuários</a>
  <button class="dk-btn" id="dk-btn" title="Alternar tema">🌙</button>
  <button class="nav-btn" onclick="logout()">Sair</button>
</nav>

<div class="page">
  <div class="page-hdr">
    <h1>Minhas Obras</h1>
    <span style="flex:1"></span>
    <button class="btn-new" id="btn-new-proj" style="display:none" onclick="openNew()">＋ Nova Obra</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- Modal nova obra -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h3>Nova Obra</h3>
    <div class="field"><label>Nome da Obra *</label><input id="f-name" placeholder="Ex: Fábrica XYZ"></div>
    <div class="field"><label>Cliente</label><input id="f-client" placeholder="Nome do cliente"></div>
    <div class="field"><label>Local / Cidade</label><input id="f-loc" placeholder="Ex: São Paulo SP"></div>
    <div class="field"><label>Data Início</label><input type="date" id="f-start"></div>
    <div class="field"><label>Data Término</label><input type="date" id="f-end"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeNew()">Cancelar</button>
      <button class="btn-save" onclick="saveNew()">Criar Obra</button>
    </div>
  </div>
</div>

<script>
(function(){
  const DK='gantt-dark';
  function apply(on){document.documentElement.classList.toggle('dark',on);const b=document.getElementById('dk-btn');if(b)b.textContent=on?'☀️':'🌙';}
  apply(localStorage.getItem(DK)==='1');
  document.getElementById('dk-btn').onclick=function(){const on=!document.documentElement.classList.contains('dark');localStorage.setItem(DK,on?'1':'0');apply(on);};
})();

const TOKEN=localStorage.getItem('bcm_token');
const ROLE=localStorage.getItem('bcm_role');
const NAME=localStorage.getItem('bcm_name');

if(!TOKEN){window.location.href='/';throw 0;}

document.getElementById('nav-user').textContent=NAME+' ('+ROLE+')';
if(ROLE==='admin'||ROLE==='gestor'){
  document.getElementById('btn-new-proj').style.display='flex';
}
if(ROLE==='admin') document.getElementById('link-users').style.display='';

// Load logo
fetch('/static/bcm-logo.jpg',{method:'HEAD'}).then(r=>{if(r.ok)document.getElementById('nav-logo').src='/static/bcm-logo.jpg';}).catch(()=>{});

async function api(path,opts={}){
  const r=await fetch(path,{...opts,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json',...(opts.headers||{})}});
  if(r.status===401){logout();throw 0;}
  return r;
}

function logout(){localStorage.clear();window.location.href='/';}

const STATUS_MAP={active:'Ativo',paused:'Pausado',done:'Concluído'};
const STATUS_CLASS={active:'s-active',paused:'s-paused',done:'s-done'};

async function load(){
  const r=await api('/api/projects');
  const projects=await r.json();
  const grid=document.getElementById('grid');
  if(!projects.length){
    grid.innerHTML=`<div class="empty"><svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M2 7.5A5.5 5.5 0 0113.5 7h.5a5 5 0 015 5v.5m-16 0h16M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7"/></svg><div>Nenhuma obra encontrada</div></div>`;
    return;
  }
  // Fetch tasks for progress
  const rows=await Promise.all(projects.map(async p=>{
    try{
      const tr=await api('/api/projects/'+p.id+'/tasks');
      const tasks=await tr.json();
      const avg=tasks.length?Math.round(tasks.reduce((a,t)=>a+t.progress,0)/tasks.length):0;
      return{...p,progress:avg,task_count:tasks.length};
    }catch{return{...p,progress:0,task_count:0};}
  }));
  grid.innerHTML=rows.map(p=>`
    <a class="card" href="/project/${p.id}">
      <div class="card-top">
        <div class="card-name">${esc(p.name)}</div>
        <span class="card-status ${STATUS_CLASS[p.status]||'s-active'}">${STATUS_MAP[p.status]||'Ativo'}</span>
      </div>
      <div class="card-client">${p.client?'👤 '+esc(p.client):''}</div>
      <div class="card-loc">${p.location?'📍 '+esc(p.location):''}</div>
      <div class="card-dates">${p.start_date?fmt(p.start_date):''} ${p.start_date&&p.end_date?'→':''} ${p.end_date?fmt(p.end_date):''}</div>
      <div class="card-prog">
        <div class="prog-lbl"><span>Progresso</span><span>${p.progress}%</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${p.progress}%"></div></div>
        <div style="font-size:11px;color:var(--txt3);margin-top:4px">${p.task_count} tarefas</div>
      </div>
    </a>
  `).join('');
}
load();

function fmt(d){if(!d)return'';const[y,m,day]=d.split('-');return day+'/'+m+'/'+y;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function openNew(){document.getElementById('modal-overlay').classList.add('open');}
function closeNew(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').onclick=e=>{if(e.target===document.getElementById('modal-overlay'))closeNew();};

async function saveNew(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Informe o nome da obra');return;}
  const body={name,client:document.getElementById('f-client').value,location:document.getElementById('f-loc').value,start_date:document.getElementById('f-start').value||null,end_date:document.getElementById('f-end').value||null};
  const r=await api('/api/projects',{method:'POST',body:JSON.stringify(body)});
  if(!r.ok){const d=await r.json();alert(d.detail||'Erro ao criar');return;}
  closeNew();
  document.getElementById('f-name').value='';document.getElementById('f-client').value='';document.getElementById('f-loc').value='';
  load();
}
</script>
</body>
</html>
